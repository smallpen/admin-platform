services:
  mysql:
    image: mysql:8.0
    container_name: admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      admin_platform
      MYSQL_USER:          admin
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-allowed-packet=67108864
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "admin", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      DATABASE_URL:           "mysql://admin:${MYSQL_PASSWORD}@mysql:3306/admin_platform?charset=utf8mb4"
      BACKEND_PORT:           3001
      BACKEND_HOST:           0.0.0.0
      JWT_ACCESS_SECRET:      ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN:            ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: admin-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql-data:
    driver: local

networks:
  app-network:
    driver: bridge
